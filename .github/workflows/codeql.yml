name: codeql

# CodeQL security analysis for the core C++ engine and ir-spec Lean 4.
# Scans every PR and push to main. Alerts appear as GitHub Security
# tab findings and can block PR merges via the required check.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (cpp)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['cpp']

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual
          config: |
            paths:
              - core/src
              - core/include
              - tests

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build clang-17

      - name: Build with CodeQL tracing
        run: |
          cmake -S core -B core/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-17
          cmake --build core/build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
