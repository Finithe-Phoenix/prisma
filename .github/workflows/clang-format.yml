name: clang-format

# Verifies every C/C++ source under core/ matches .clang-format.
# CLAUDE.md mandates "Clang-format + clang-tidy obligatorio" — this
# is the CI enforcement half. Runs on every PR so it can be a required
# check without going Pending.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: clang-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-17

      - name: Run clang-format check
        run: |
          set -euo pipefail
          # Find all C/C++ files in core/ (exclude third_party and build dirs)
          find core/ -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' \
            | grep -v '/build/' | grep -v '/third_party/' \
            | xargs clang-format-17 -n --Werror 2>&1
