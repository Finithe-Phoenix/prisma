name: clang-format

# Verifies C/C++ sources touched by a change match .clang-format.
# CLAUDE.md mandates "Clang-format + clang-tidy obligatorio" — this is
# the CI enforcement half, scoped to CHANGED files so the gate adopts
# incrementally: the pre-existing tree is not clang-format-clean (the
# checked-in style says 2-space while core/ is 4-space throughout),
# and a whole-tree reformat is a churn decision for Danny.
#
# ADVISORY (continue-on-error) until that reconciliation lands —
# tracked in WORK_QUEUE.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: clang-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install clang-format-17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-17

      - name: Run clang-format check on changed files
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch -q origin "${{ github.base_ref }}"
            base="origin/${{ github.base_ref }}"
          else
            base="${{ github.event.before }}"
          fi
          files=$(git diff --name-only --diff-filter=ACMR "$base"...HEAD -- \
              'core/**/*.cpp' 'core/**/*.hpp' 'core/**/*.c' 'core/**/*.h' \
            | grep -v '/build/' | grep -v '/third_party/' || true)
          if [ -z "$files" ]; then
            echo "No C/C++ changes under core/ — nothing to check."
            exit 0
          fi
          echo "$files" | xargs clang-format-17 -n --Werror 2>&1
