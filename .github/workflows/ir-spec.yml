name: ir-spec (Lean 4)

# Verifies that the formal IR specification still builds and all proofs
# type-check. This is the guardrail on Pillar 2: if this fails, a proposed
# change to the IR broke semantics or a soundness proof.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ir-spec-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ir-spec-build:
    name: ir-spec-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ir-spec
    steps:
      - uses: actions/checkout@v6

      - name: Read toolchain version
        id: toolchain
        run: echo "version=$(cat lean-toolchain)" >> "$GITHUB_OUTPUT"

      - name: Install elan + Lean 4
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ir-spec/.lake
            ~/.elan/toolchains
          key: lean-${{ runner.os }}-${{ steps.toolchain.outputs.version }}-${{ hashFiles('ir-spec/lakefile.toml', 'ir-spec/lean-toolchain') }}
          restore-keys: |
            lean-${{ runner.os }}-${{ steps.toolchain.outputs.version }}-

      - name: Build PrismaIR
        run: lake build

      - name: Verify toolchain pinned
        run: |
          test -f lean-toolchain || (echo "lean-toolchain missing" && exit 1)

      # F1-TC-009 — Lean proof check is a blocking step.
      #
      # Two safeguards:
      #   1. `lake build` above must succeed. Compile failure aborts CI.
      #   2. Track the `sorry` admission count so regressions surface in
      #      CI instead of silently accumulating. The baseline is
      #      recorded in ir-spec/.sorry-budget; exceeding it fails the
      #      job. A reduction must update the budget in the same PR.
      - name: Sorry budget check
        run: |
          set -euo pipefail
          budget_file=".sorry-budget"
          if [ ! -f "$budget_file" ]; then
            echo "::error::missing $budget_file — run 'grep -rc sorry PrismaIR' and commit the expected count."
            exit 1
          fi
          budget=$(tr -d '[:space:]' < "$budget_file")
          # Count sorry usages in .lean files only (exclude .lake/).
          # `grep || true` so the "zero matches → exit 1" interaction with
          # `set -e -o pipefail` does not abort the job when the spec is
          # already sorry-free.
          actual=$( { grep -rn --include='*.lean' '^[[:space:]]*sorry\b' PrismaIR || true; } | wc -l | tr -d ' ')
          echo "sorry budget: $budget"
          echo "sorry actual: $actual"
          if [ "$actual" -gt "$budget" ]; then
            echo "::error::sorry count $actual exceeds budget $budget. Either finish the proof or update .sorry-budget."
            exit 1
          fi
          if [ "$actual" -lt "$budget" ]; then
            echo "::warning::sorry count $actual is below budget $budget. Consider lowering the budget in .sorry-budget to lock in the win."
          fi
