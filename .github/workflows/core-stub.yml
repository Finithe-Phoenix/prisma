name: core (C++20) — stub

# Stub workflow for the core/ C++ DBT engine. Activates once core/CMakeLists.txt
# exists (Fase 1, semana 9+). Until then, this only runs a smoke check that the
# scaffolding is in place.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-build:
    name: core-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify core/ scaffolding
        run: |
          set -euo pipefail
          test -f core/README.md || { echo "core/README.md missing"; exit 1; }
          if [ -f core/CMakeLists.txt ]; then
            echo "core/CMakeLists.txt detected — running real build"
            sudo apt-get update -qq
            sudo apt-get install -y -qq cmake ninja-build clang-17
            cmake -S core -B core/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_CXX_COMPILER=clang++-17
            cmake --build core/build
            ctest --test-dir core/build --output-on-failure
          else
            echo "core/CMakeLists.txt not yet present (Fase 1 not started). Scaffolding check only."
          fi

  # Same suite on a real ARM64 runner (free for public repos). This is
  # where the e2e corpus actually EXECUTES translated guest code in the
  # JIT — on x86_64 those assertions are skipped behind the is_arm64
  # gate. Before this job, JIT execution was only verified on developer
  # Apple Silicon machines.
  core-build-arm64:
    name: core-build-arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Build and run the full suite (JIT executes here)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build clang-17
          cmake -S core -B core/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-17
          cmake --build core/build
          ctest --test-dir core/build --output-on-failure
