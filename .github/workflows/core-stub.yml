name: core (C++20) — stub

# Stub workflow for the core/ C++ DBT engine. Activates once core/CMakeLists.txt
# exists (Fase 1, semana 9+). Until then, this only runs a smoke check that the
# scaffolding is in place.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-build:
    name: core-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify core/ scaffolding
        run: |
          set -euo pipefail
          test -f core/README.md || { echo "core/README.md missing"; exit 1; }
          if [ -f core/CMakeLists.txt ]; then
            echo "core/CMakeLists.txt detected — running real build"
            sudo apt-get update -qq
            sudo apt-get install -y -qq cmake ninja-build clang-17
            cmake -S core -B core/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_CXX_COMPILER=clang++-17
            cmake --build core/build
            ctest --test-dir core/build --output-on-failure
          else
            echo "core/CMakeLists.txt not yet present (Fase 1 not started). Scaffolding check only."
          fi
