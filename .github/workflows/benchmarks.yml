name: benchmarks

on:
  push:
  pull_request:

jobs:
  benchmarks-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install benchmark package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e 'tools/benchmarks[dev]'

      - name: Test benchmark package
        run: |
          cd tools/benchmarks
          pytest -q
          ruff check .
          mypy src tests

      - name: Smoke-run Dhrystone corpus
        run: |
          mkdir -p /tmp/prisma-bench-smoke
          prisma-bench run \
            --backend native \
            --corpus dhrystone \
            --iterations 1000 \
            --output /tmp/prisma-bench-smoke
          prisma-bench report /tmp/prisma-bench-smoke --format json
          test -s /tmp/prisma-bench-smoke/dhrystone-native.json
          test -s /tmp/prisma-bench-smoke/summary.json
